<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chọn đi nào... 👀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 4px;
    color: #fff;
    text-align: center;
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 1rem;
    color: #888;
    text-align: center;
    margin-bottom: 2rem;
    letter-spacing: 1px;
  }
  .arena {
    display: flex;
    gap: 2rem;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    padding: 0 1rem;
  }
  .vs-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: #ff4d4d;
    text-shadow: 0 0 20px #ff4d4d88;
    flex-shrink: 0;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .card:hover { transform: scale(1.03); }
  .img-frame {
    width: clamp(180px, 30vw, 280px);
    height: clamp(270px, 45vw, 420px);
    border-radius: 18px;
    overflow: hidden;
    border: 3px solid #ffffff22;
    position: relative;
    transition: border-color 0.3s;
  }
  .card:hover .img-frame {
    border-color: #ff4d4daa;
    box-shadow: 0 0 30px #ff4d4d44;
  }
  .img-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .choose-btn {
    background: linear-gradient(135deg, #ff4d4d, #ff8c00);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 3px;
    border: none;
    border-radius: 50px;
    padding: 0.6rem 2.5rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 18px #ff4d4d44;
  }
  .choose-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px #ff4d4d66;
  }
  .choose-btn:active { transform: scale(0.97); }
  #result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .result-img {
    width: clamp(250px, 70vw, 420px);
    height: clamp(250px, 70vw, 420px);
    border-radius: 20px;
    object-fit: cover;
    border: 4px solid #ff4d4d;
    box-shadow: 0 0 60px #ff4d4d66;
  }
  .result-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    color: #ff4d4d;
    letter-spacing: 4px;
    text-align: center;
    text-shadow: 0 0 30px #ff4d4d88;
  }
  .result-sub {
    font-size: 1.1rem;
    color: #aaa;
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }
  .replay-btn {
    background: transparent;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    border: 2px solid #ffffff44;
    border-radius: 50px;
    padding: 0.6rem 2rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 1px;
  }
  .replay-btn:hover { border-color: #fff; color: #fff; }
</style>
</head>

  function pick(choice) {
    var r = results[choice];
    document.getElementById('result-img').src = r.img;
    document.getElementById('result-label').textContent = r.label;
    document.getElementById('result-sub').textContent = r.sub;
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
  }

  function replay() {
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
  }
